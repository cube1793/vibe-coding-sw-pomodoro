<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뽀모도로 학습 타이머 & 할 일 관리</title>
    <style>
        /* CSS Reset 및 변수 정의 */
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --primary-color: #4f46e5; /* Indigo */
            --primary-hover: #4338ca;
            --accent-color: #ef4444; /* Red for focus */
            --break-color: #10b981; /* Green for break */
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        /* 레이아웃 구성 */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .app-container {
                grid-template-columns: 1fr 1fr;
            }
            .timer-section {
                grid-column: span 2;
            }
        }

        @media (min-width: 1024px) {
            .app-container {
                grid-template-columns: 3fr 4fr 3fr;
            }
            .timer-section {
                grid-column: span 1;
            }
        }

        /* 공통 카드 스타일 */
        .card {
            background-color: var(--container-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        /* 1. 타이머 섹션 스타일 */
        .timer-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .timer-state {
            font-size: 1rem;
            font-weight: 500;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .timer-display {
            font-size: 4.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin: 1rem 0;
            color: var(--text-primary);
        }

        .timer-controls {
            display: flex;
            gap: 0.75rem;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: var(--bg-color);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--border-color);
        }

        /* 비활성화 버튼 디자인 */
        .btn:disabled {
            background-color: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* 2. 할 일 목록 섹션 스타일 */
        .task-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .task-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .task-est-select {
            width: 80px;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            background-color: white;
        }

        .task-list {
            list-style: none;
            max-height: 350px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .task-item-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .task-checkbox {
            width: 1.1rem;
            height: 1.1rem;
            cursor: pointer;
        }

        .task-text {
            font-size: 0.95rem;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-delete:hover {
            color: var(--accent-color);
        }

        /* 3. 통계 섹션 스타일 */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .stat-card {
            background-color: var(--bg-color);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-val {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 0.25rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- 통계 세션 (Analytics Bounded Context) -->
        <section class="card" id="analytics-panel">
            <h2 class="card-title">오늘의 학습 현황</h2>
            <div class="stat-grid">
                <div class="stat-card">
                    <p class="stat-label">완료한 뽀모도로</p>
                    <p class="stat-val" id="stat-completed-pomodoros">0 / 8</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">총 집중 시간</p>
                    <p class="stat-val" id="stat-total-time">0 분</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">할 일 완료율</p>
                    <p class="stat-val" id="stat-completion-rate">0%</p>
                </div>
            </div>
        </section>

        <!-- 타이머 세션 (Timer Bounded Context) -->
        <section class="card timer-section" id="timer-panel">
            <div class="timer-state" id="timer-status">집중 시간 (Focus)</div>
            <div class="timer-display" id="timer-display">25:00</div>
            <div class="timer-controls">
                <button class="btn btn-primary" id="btn-timer-start">시작</button>
                <button class="btn btn-secondary" id="btn-timer-pause">일시정지</button>
                <button class="btn btn-secondary" id="btn-timer-reset">초기화</button>
            </div>
        </section>

        <!-- 할 일 관리 세션 (Task Bounded Context) -->
        <section class="card" id="task-panel">
            <h2 class="card-title">할 일 목록</h2>
            <div class="task-input-group">
                <input type="text" class="task-input" id="task-input-field" placeholder="수행할 작업을 입력하세요...">
                <select class="task-est-select" id="task-est-input" title="예상 뽀모도로 세션 개수">
                    <option value="1">🍅 1</option>
                    <option value="2">🍅 2</option>
                    <option value="3">🍅 3</option>
                    <option value="4">🍅 4</option>
                    <option value="5">🍅 5</option>
                </select>
                <button class="btn btn-primary" id="btn-add-task" style="flex: none;">추가</button>
            </div>
            <ul class="task-list" id="task-list-container">
                <!-- 동적 마크업 생성 영역 -->
            </ul>
        </section>

    </div>

    <script>
        // ==========================================
        // 1. Timer Bounded Context 도메인 정의
        // ==========================================
        const TimerDomain = {
            state: 'IDLE', // 'IDLE' | 'RUNNING' | 'PAUSED'
            defaultDuration: 25 * 60, // 25분 (초 단위)
            timeLeft: 25 * 60,
            intervalId: null,

            onTick: null,
            onStateChange: null,
            onComplete: null,

            init(config) {
                this.onTick = config.onTick;
                this.onStateChange = config.onStateChange;
                this.onComplete = config.onComplete;
                this.reset();
            },

            start() {
                if (this.state === 'RUNNING') return;
                this.state = 'RUNNING';
                this.notifyStateChange();

                this.intervalId = setInterval(() => {
                    this.timeLeft--;
                    this.notifyTick();

                    if (this.timeLeft <= 0) {
                        this.complete();
                    }
                }, 1000);
            },

            pause() {
                if (this.state !== 'RUNNING') return;
                clearInterval(this.intervalId);
                this.state = 'PAUSED';
                this.notifyStateChange();
            },

            reset() {
                clearInterval(this.intervalId);
                this.state = 'IDLE';
                this.timeLeft = this.defaultDuration;
                this.notifyStateChange();
                this.notifyTick();
            },

            complete() {
                clearInterval(this.intervalId);
                this.state = 'IDLE';
                this.timeLeft = this.defaultDuration;
                this.notifyStateChange();
                this.notifyTick();
                if (this.onComplete) {
                    this.onComplete();
                }
            },

            notifyTick() {
                if (this.onTick) this.onTick(this.timeLeft);
            },

            notifyStateChange() {
                if (this.onStateChange) this.onStateChange(this.state);
            }
        };

        // ==========================================
        // 2. Task Bounded Context 도메인 정의
        // ==========================================
        const TaskDomain = {
            tasks: [],
            onTasksChanged: null,

            init(config) {
                this.onTasksChanged = config.onTasksChanged;
                // 초기 데이터 시드
                this.tasks = [
                    { id: '1', text: '알고리즘 문제 풀이', completed: false, estimated: 2, actual: 1 },
                    { id: '2', text: '컴퓨터 네트워크 과제 읽기', completed: true, estimated: 1, actual: 1 }
                ];
                this.notify();
            },

            // 중복 입력을 확인하는 방어 검증 로직
            isDuplicate(text) {
                const targetText = text.trim().toLowerCase();
                return this.tasks.some(task => !task.completed && task.text.trim().toLowerCase() === targetText);
            },

            addTask(text, estimated) {
                const cleanText = text.trim();
                if (!cleanText) return;

                const newTask = {
                    id: Date.now().toString(),
                    text: cleanText,
                    completed: false,
                    estimated: parseInt(estimated, 10),
                    actual: 0
                };
                this.tasks.push(newTask);
                this.notify();
            },

            toggleTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.notify();
                }
            },

            deleteTask(id) {
                this.tasks = this.tasks.filter(t => t.id !== id);
                this.notify();
            },

            incrementActiveTaskPomodoro() {
                const activeTask = this.tasks.find(t => !t.completed);
                if (activeTask) {
                    activeTask.actual++;
                    this.notify();
                }
            },

            notify() {
                if (this.onTasksChanged) {
                    this.onTasksChanged([...this.tasks]);
                }
            }
        };

        // ==========================================
        // 3. Analytics Bounded Context 도메인 정의
        // ==========================================
        const AnalyticsDomain = {
            completedPomodoros: 4, // 시드값 설정
            totalStudyTime: 100,
            completionRate: 0,
            onStatsChanged: null,

            init(config) {
                this.onStatsChanged = config.onStatsChanged;
            },

            addPomodoroSession() {
                this.completedPomodoros++;
                this.totalStudyTime += 25;
                this.notify();
            },

            updateCompletionRate(tasks) {
                if (tasks.length === 0) {
                    this.completionRate = 0;
                } else {
                    const completedCount = tasks.filter(t => t.completed).length;
                    this.completionRate = Math.round((completedCount / tasks.length) * 100);
                }
                this.notify();
            },

            notify() {
                if (this.onStatsChanged) {
                    this.onStatsChanged({
                        completedPomodoros: this.completedPomodoros,
                        totalStudyTime: this.totalStudyTime,
                        completionRate: this.completionRate
                    });
                }
            }
        };

        // ==========================================
        // 4. UI/DOM 바인딩 및 어댑터 통합 레이어
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements 정의
            const timerDisplay = document.getElementById('timer-display');
            const timerStatus = document.getElementById('timer-status');
            const startBtn = document.getElementById('btn-timer-start');
            const pauseBtn = document.getElementById('btn-timer-pause');
            const resetBtn = document.getElementById('btn-timer-reset');

            const taskInputField = document.getElementById('task-input-field');
            const taskEstInput = document.getElementById('task-est-input');
            const addTaskBtn = document.getElementById('btn-add-task');
            const taskListContainer = document.getElementById('task-list-container');

            const statCompletedPomodoros = document.getElementById('stat-completed-pomodoros');
            const statTotalTime = document.getElementById('stat-total-time');
            const statCompletionRate = document.getElementById('stat-completion-rate');

            // 포맷 데이터 파서 유틸리티
            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                return `${mins}:${secs}`;
            }

            // 할 일 추가 서브미션 처리 함수
            function submitTask() {
                const text = taskInputField.value;
                const est = taskEstInput.value;
                const trimmed = text.trim();

                // 1) 비어 있는 입력값 예외 검증
                if (!trimmed) {
                    alert('할 일 내용을 올바르게 입력해 주세요.');
                    taskInputField.focus();
                    return;
                }

                // 2) 중복된 입력값 존재 확인 검증
                if (TaskDomain.isDuplicate(trimmed)) {
                    alert('진행 중인 할 일 목록에 이미 같은 이름의 작업이 존재합니다.');
                    taskInputField.focus();
                    return;
                }

                TaskDomain.addTask(trimmed, est);
                taskInputField.value = '';
                taskEstInput.value = '1';
            }

            // 할 일 렌더링 핸들러
            function renderTaskList(tasks) {
                taskListContainer.innerHTML = '';
                tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = 'task-item';

                    li.innerHTML = `
                        <div class="task-item-left">
                            <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                            <span class="task-text ${task.completed ? 'completed' : ''}">${task.text}</span>
                        </div>
                        <div class="task-meta">
                            <span>🍅 ${task.actual} / ${task.estimated}</span>
                            <button class="btn-delete" title="삭제">✕</button>
                        </div>
                    `;

                    li.querySelector('.task-checkbox').addEventListener('change', () => TaskDomain.toggleTask(task.id));
                    li.querySelector('.btn-delete').addEventListener('click', () => TaskDomain.deleteTask(task.id));

                    taskListContainer.appendChild(li);
                });
            }

            // 모듈 이벤트를 처리하기 위한 통합 구성 정의
            TaskDomain.init({
                onTasksChanged: (tasks) => {
                    renderTaskList(tasks);
                    AnalyticsDomain.updateCompletionRate(tasks);
                }
            });

            AnalyticsDomain.init({
                onStatsChanged: (stats) => {
                    statCompletedPomodoros.textContent = `${stats.completedPomodoros} / 8`;
                    statTotalTime.textContent = `${stats.totalStudyTime} 분`;
                    statCompletionRate.textContent = `${stats.completionRate}%`;
                }
            });
            AnalyticsDomain.updateCompletionRate(TaskDomain.tasks);

            TimerDomain.init({
                onTick: (timeLeft) => {
                    timerDisplay.textContent = formatTime(timeLeft);
                },
                onStateChange: (state) => {
                    // 타이머 진행 중 상태일 때 시작 버튼 비활성화 상태 전이 처리
                    if (state === 'RUNNING') {
                        startBtn.disabled = true;
                        timerStatus.textContent = '집중 시간 (Focusing...)';
                        timerStatus.style.color = 'var(--accent-color)';
                    } else {
                        startBtn.disabled = false;
                        if (state === 'PAUSED') {
                            timerStatus.textContent = '일시정지됨 (Paused)';
                            timerStatus.style.color = 'var(--text-secondary)';
                        } else {
                            timerStatus.textContent = '집중 시간 (Focus)';
                            timerStatus.style.color = 'var(--text-primary)';
                        }
                    }
                },
                onComplete: () => {
                    AnalyticsDomain.addPomodoroSession();
                    TaskDomain.incrementActiveTaskPomodoro();
                    setTimeout(() => {
                        alert('집중 세션이 종료되었습니다! 5분간 휴식하세요.');
                    }, 100);
                }
            });

            // UI 이벤트 리스너 마운트
            startBtn.addEventListener('click', () => TimerDomain.start());
            pauseBtn.addEventListener('click', () => TimerDomain.pause());
            resetBtn.addEventListener('click', () => TimerDomain.reset());
            addTaskBtn.addEventListener('click', submitTask);

            taskInputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    submitTask();
                }
            });
        });
    </script>
</body>
</html>
